name: Dependency review

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      # The action fails by default if the pull request adds a dependency with a
      # known vulnerability. Keep the default threshold so no severity is ignored.
      - name: Check new dependencies for known vulnerabilities
        uses: actions/dependency-review-action@v4
