name: Prelaunch DAST

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prelaunch-dast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dast:
    name: Staging DAST gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DAST_BASE_URL: ${{ vars.IROGUIDE_STAGING_URL || secrets.IROGUIDE_STAGING_URL }}
      DAST_REQUIRE_READY: "true"
      DAST_REPORT_PATH: artifacts/dast-prelaunch-report.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Verify staging URL configuration
        run: |
          if [ -z "${DAST_BASE_URL}" ]; then
            echo "Configure vars.IROGUIDE_STAGING_URL or secrets.IROGUIDE_STAGING_URL before running this workflow." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run prelaunch DAST
        run: npm run dast:prelaunch

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-prelaunch-report
          path: artifacts/dast-prelaunch-report.json
          if-no-files-found: warn
