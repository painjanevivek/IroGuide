name: Bug report
description: Report a reproducible product bug in IroGuide.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve IroGuide. This issue will be public, so do not include passwords, API keys, private review content, personal data, or other sensitive information.
  - type: input
    id: page-url
    attributes:
      label: Page URL
      description: Paste the IroGuide page where the problem happened.
      placeholder: https://iroguide.com/review/new
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Briefly describe the bug.
      placeholder: Tell us what broke or behaved unexpectedly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact actions needed to see the bug.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      placeholder: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Account or sign-in
        - Review upload
        - Critique results
        - Saved reviews or sync
        - Community
        - Portfolio
        - Pricing or marketing page
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Device and browser
      placeholder: Windows 11, Chrome 126
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recording
      description: Optional. Attach only if it does not reveal private or sensitive content.
    validations:
      required: false
